name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.1.3"
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Pytest
        run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/'))
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build packaging
      - name: Check release branch
        if: github.event_name == 'workflow_dispatch'
        run: |
          case "${GITHUB_REF}" in
            refs/heads/release|refs/heads/release/*) ;;
            *)
              echo "Manual publish must be run from the release branch or a release/* branch."
              exit 1
              ;;
          esac
      - name: Set project version
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          from packaging.version import InvalidVersion, Version

          version = os.environ["RELEASE_VERSION"].strip()
          if not version:
              print("Version is required.", file=sys.stderr)
              sys.exit(1)

          try:
              Version(version)
          except InvalidVersion:
              print(f"Invalid PEP 440 version: {version}", file=sys.stderr)
              sys.exit(1)

          path = Path("pyproject.toml")
          text = path.read_text(encoding="utf-8")
          current_match = re.search(r'(?m)^version = "([^"]+)"$', text)
          if current_match is None:
              print("Expected a project version in pyproject.toml.", file=sys.stderr)
              sys.exit(1)

          current_version = Version(current_match.group(1))
          release_version = Version(version)
          if release_version <= current_version:
              print(
                  f"Release version {release_version} must be greater than "
                  f"current version {current_version}.",
                  file=sys.stderr,
              )
              sys.exit(1)

          updated, replacements = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          if replacements != 1:
              print("Expected exactly one project version in pyproject.toml.", file=sys.stderr)
              sys.exit(1)

          path.write_text(updated, encoding="utf-8")
          PY
      - name: Build distribution
        run: |
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: pypi
      url: https://pypi.org/p/vipii
    permissions:
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          username: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
